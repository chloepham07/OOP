<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christmas Letter</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0c1425;
      font-family: 'Dancing Script', cursive;
    }
    .snowflake {
      position: fixed;
      top: -10vh;
      color: white;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 1;
    }
    @keyframes fall {
      to { transform: translateY(120vh); opacity: 100; }
    }
    .envelope-wrapper {
      position: relative;
      width: 660px;
      height: 500px;
      perspective: 1200px;
      z-index: 10;
      transition: transform 0.8s ease;
    }
    .envelope-wrapper.open {
      transform: translateY(120px);
    }
    .envelope {
      position: absolute;
      inset: 0;
      background: #f5f1e6;
      border-radius: 15px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.55);
      z-index: 2;
    }
    .envelope::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.03), transparent 40%);
      pointer-events: none;
    }
    .fold-left,
    .fold-right {
      position: absolute;
      bottom: 200;
      width: 200;
      height: 200;
      border-top: 150px solid transparent;
      border-bottom: 150px solid #f5f1e6;
      z-index: 3;
      pointer-events: none;
    }
    .fold-left {
      left: 200;
      border-left: 230px solid #f5f1e6;
    }
    .fold-right {
      right: 200;
      border-right: 230px solid #f5f1e6;
    }
    .fold-bottom {
      position: absolute;
      bottom: 200;
      width: 200;
      height: 200;
      border-left: 230px solid transparent;
      border-right: 230px solid transparent;
      border-bottom: 160px solid #efe9da;
      z-index: 4;
      pointer-events: none;
    }
    .flap {
      position: absolute;
      top: 200;
      left: 200;
      width: 200;
      height: 200;
      border-left: 230px solid transparent;
      border-right: 230px solid transparent;
      border-top: 170px solid #f0ebdd;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      z-index: 6;
      pointer-events: none;
    }
    .envelope-wrapper.open .flap {
      transform: rotateX(180deg);
    }
    .seal {
      position: absolute;
      top: 155px;
      left: 50%;
      transform: translateX(-50%);
      width: 62px;
      height: 62px;
      background: radial-gradient(circle at 30% 30%, #b91c1c, #7a1212);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 10;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 6px 12px rgba(0,0,0,0.5);
    }
    .envelope-wrapper.open .seal {
      opacity: 0;
      pointer-events: none;
    }
    .letter {
      position: absolute;
      top: 40px;
      left: 50px;
      width: 600px;
      height: 460px;
      background: #fffdfa;
      padding: 32px;
      border-radius: 4px;
      z-index: 1;
      transition: all 0.9s cubic-bezier(0.18, 0.9, 0.3, 1.2);
      overflow: hidden;
    }
    .envelope-wrapper.open .letter {
      transform: translateY(340px);
      width: 660px;
      height: 780px;
      left: 0;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 20px 70px rgba(0,0,0,0.65);
    }
    .letter h1 {
      font-family: 'Great Vibes', cursive;
      text-align: center;
      font-size: 2.6rem;
      color: #9e1b1b;
      margin-top: 0;
    }
    .letter p {
      font-size: 1.3rem;
      line-height: 1.7;
      color: #2c1810;
    }
  </style>
</head>
<body>
  <div class="envelope-wrapper" id="envelope">
    <div class="flap"></div>
    <div class="fold-left"></div>
    <div class="fold-right"></div>
    <div class="fold-bottom"></div>
    <div class="seal" onclick="toggleLetter(event)">🦌</div>
    <div class="envelope">
      <div class="letter" onclick="toggleLetter(event)">
        <h1>Merry Christmas</h1>
        <p>Dearest Friend,</p>
        <p>This envelope now behaves like a real one: folded, layered, and gently opened.</p>
        <p>May your holidays be warm, quiet, and wrapped in care.</p>
        <p style="text-align:right">— Your Digital Santa 🎄</p>
      </div>
    </div>
  </div>
  <script>
    function toggleLetter(e) {
      e.stopPropagation();
      document.getElementById('envelope').classList.toggle('open');
    }
    for (let i = 0; i < 50; i++) {
      const snow = document.createElement('div');
      snow.className = 'snowflake';
      snow.textContent = '❄';
      snow.style.left = Math.random() * 100 + 'vw';
      snow.style.fontSize = 10 + Math.random() * 15 + 'px';
      snow.style.opacity = Math.random();
      snow.style.animationDuration = 3 + Math.random() * 4 + 's';
      snow.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(snow);
    }
  </script>
</body>
</html>
